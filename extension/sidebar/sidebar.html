<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Code Coach</title>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <main>
      <h1>Code Coach</h1>
      <div class="status-row">
        <p id="status">Waiting for a supported coding site...</p>
        <span id="sidebarSpinner" class="sidebar-spinner hidden" aria-label="Analyzing"></span>
      </div>
      <section id="summary"></section>
      <section>
        <h2>Suggestions</h2>
        <div id="suggestions"></div>
      </section>
      <section id="previewSection" class="preview hidden">
        <h2>Fix Preview</h2>
        <p id="previewMeta"></p>
        <pre id="previewCode"></pre>
      </section>
      <div class="actions">
        <button id="refreshBtn">Refresh Analysis</button>
        <div id="copyFeedback"></div>
      </div>
    </main>
    <script src="sidebar.js"></script>
  </body>
</html>
