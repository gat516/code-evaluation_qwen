<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Code Coach Settings</title>
    <style>
      body { font-family: Segoe UI, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
      label { display: block; margin-top: 14px; font-weight: 600; }
      input[type="text"] { width: 100%; padding: 8px; }
      select { width: 100%; padding: 8px; }
      .row { margin-top: 12px; }
      button { margin-top: 18px; padding: 10px 14px; background: #0f766e; color: #fff; border: 0; border-radius: 8px; }
      #saved { margin-top: 8px; color: #065f46; }
    </style>
  </head>
  <body>
    <h1>Code Coach Settings</h1>
    <p>Configure detection and suggestion analysis behavior.</p>

    <label for="backendUrl">Backend URL (AI mode)</label>
    <input id="backendUrl" type="text" placeholder="http://127.0.0.1:8000" />

    <label for="apiKey">API Key (optional)</label>
    <input id="apiKey" type="text" placeholder="X-API-Key value" />

    <div class="row">
      <label><input id="broadDetection" type="checkbox" /> Enable broad editor detection (Monaco/CodeMirror/Ace/Textarea)</label>
    </div>

    <div class="row">
      <label><input id="autoAnalyze" type="checkbox" /> Auto-analyze while typing</label>
    </div>

    <button id="saveBtn">Save Settings</button>
    <div id="saved"></div>

    <script src="options.js"></script>
  </body>
</html>
